# Filtering forward-proxy for the AI sandbox. Default-deny; only the domains in
# /etc/tinyproxy/filter are reachable (package mirrors for installs).
Port 8888
Listen 0.0.0.0
Timeout 600
Allow 0.0.0.0/0
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterExtended On
FilterURLs Off
ConnectPort 443
ConnectPort 80
# Do not leak proxy presence/internal client info to upstreams.
DisableViaHeader Yes
