services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: scanr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanr -d scanr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ghcr.io/t3rr0or/scanr-api:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://scanr:${POSTGRES_PASSWORD}@postgres/scanr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      VAULT_KEY: ${VAULT_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scanr.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      SELF_UPDATE_ENABLED: ${SELF_UPDATE_ENABLED:-false}
      SELF_UPDATE_COMMAND: ${SELF_UPDATE_COMMAND:-docker-compose pull && docker-compose up -d}
      SELF_UPDATE_WORKDIR: ${SELF_UPDATE_WORKDIR:-/opt/scanr}
      WORDLIST_DIR: /app/wordlists
    ports:
      - "8000:8000"
    volumes:
      - reports_data:/app/reports
      - nvd_data:/app/nvd_cache
      - wordlists_data:/app/wordlists
    command: uvicorn scanr.main:app --host 0.0.0.0 --port 8000

  worker:
    image: ghcr.io/t3rr0or/scanr-worker:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://scanr:${POSTGRES_PASSWORD}@postgres/scanr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      VAULT_KEY: ${VAULT_KEY:-}
      SECRET_KEY: "worker-dummy-key-at-least-32-chars-long"
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scanr.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      WORDLIST_DIR: /app/wordlists
      PROXY_URL: ${PROXY_URL:-}
    cap_add:
      - NET_RAW
    volumes:
      - reports_data:/app/reports
      - nvd_data:/app/nvd_cache
      - wordlists_data:/app/wordlists
    command: celery -A scanr.tasks.celery_app worker --beat --loglevel=info --concurrency=4

  frontend:
    image: ghcr.io/t3rr0or/scanr-frontend:${SCANR_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  redis_data:
  postgres_data:
  reports_data:
  nvd_data:
  wordlists_data:
