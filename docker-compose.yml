services:
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    restart: unless-stopped
    environment:
      POSTGRES_USER: scanr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB: scanr
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanr -d scanr"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    image: ghcr.io/t3rr0or/scanr-api:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/system/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://scanr:${POSTGRES_PASSWORD}@postgres/scanr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      VAULT_KEY: ${VAULT_KEY:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scanr.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      SECURE_COOKIES: ${SECURE_COOKIES:-true}
      # Self-update is OFF by default. It requires mounting the host Docker
      # socket into the API container, which grants it root-equivalent control
      # of the host. Enable it only via the docker-compose.self-update.yml
      # override, which adds the socket and project-directory mounts for
      # trusted, admin-only deployments. The base compose file does NOT mount
      # the Docker socket into the API container.
      SELF_UPDATE_ENABLED: ${SELF_UPDATE_ENABLED:-false}
      WORDLIST_DIR: /app/wordlists
      # AI sandbox — on by default, requires SANDBOX_TOKEN in .env
      SANDBOX_RUNNER_URL: ${SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set in .env}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-ghcr.io/t3rr0or/scanr-sandbox:${SCANR_VERSION:-latest}}
      SANDBOX_CMD_TIMEOUT: ${SANDBOX_CMD_TIMEOUT:-120}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_RATE_LIMIT_TOKENS_PER_MIN: ${AI_RATE_LIMIT_TOKENS_PER_MIN:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - reports_data:/app/reports
      - nvd_data:/app/nvd_cache
      - wordlists_data:/app/wordlists
    # Bind to localhost by default — the frontend nginx proxies /api and /ws.
    # Set SCANR_API_BIND=0.0.0.0 in .env only if you need direct API access.
    ports:
      - "${SCANR_API_BIND:-127.0.0.1}:8000:8000"
    command: uvicorn scanr.main:app --host 0.0.0.0 --port 8000

  worker:
    image: ghcr.io/t3rr0or/scanr-worker:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      # Wait for the API to be healthy: only the API runs DB migrations (app
      # lifespan), so the worker must not start against an unmigrated schema.
      api:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://scanr:${POSTGRES_PASSWORD}@postgres/scanr
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      VAULT_KEY: ${VAULT_KEY:-}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@scanr.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set in .env}
      WORDLIST_DIR: /app/wordlists
      PROXY_URL: ${PROXY_URL:-}
      AI_PROVIDER: ${AI_PROVIDER:-anthropic}
      AI_MODEL: ${AI_MODEL:-}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_RATE_LIMIT_TOKENS_PER_MIN: ${AI_RATE_LIMIT_TOKENS_PER_MIN:-0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      # AI sandbox — on by default, requires SANDBOX_TOKEN in .env
      SANDBOX_RUNNER_URL: ${SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set in .env}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-ghcr.io/t3rr0or/scanr-sandbox:${SCANR_VERSION:-latest}}
      SANDBOX_CMD_TIMEOUT: ${SANDBOX_CMD_TIMEOUT:-120}
    cap_add:
      - NET_RAW
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - reports_data:/app/reports
      - nvd_data:/app/nvd_cache
      - wordlists_data:/app/wordlists
    command: celery -A scanr.tasks.celery_app worker --beat --loglevel=info --concurrency=4

  frontend:
    image: ghcr.io/t3rr0or/scanr-frontend:${SCANR_VERSION:-latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

  # ── AI command-execution sandbox ──────────────────────────────────────────
  # Only the sandbox-runner gets the Docker socket; it holds NO ScanR secrets.
  # One persistent container per agent run (state survives between commands);
  # reaped at run end and by a max-lifetime backstop. Non-root, read-only
  # rootfs (writable tmpfs for /tmp,/work,HOME), cap-drop ALL, resource/time-
  # limited, no ScanR env.
  sandbox-runner:
    image: ghcr.io/t3rr0or/scanr-sandbox-runner:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: sandbox/Dockerfile.runner
    restart: unless-stopped
    environment:
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set in .env}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-ghcr.io/t3rr0or/scanr-sandbox:${SCANR_VERSION:-latest}}
      SANDBOX_NETWORK: scanr_sandbox
      SANDBOX_PROXY_URL: ${SANDBOX_PROXY_URL:-http://sandbox-proxy:8888}
      SANDBOX_MAX_LIFETIME: ${SANDBOX_MAX_LIFETIME:-3600}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - sandbox_net

  # Filtering forward-proxy: package installs reach allowlisted mirrors only.
  # Self-built minimal image (replaces third-party vimagick/tinyproxy:latest).
  # Dual-homed: it is the ONLY component bridging the internal sandbox_net and
  # the egress network, so sandboxed containers can only reach the internet
  # through this allowlist filter.
  sandbox-proxy:
    image: ghcr.io/t3rr0or/scanr-sandbox-proxy:${SCANR_VERSION:-latest}
    build:
      context: ./backend
      dockerfile: sandbox/Dockerfile.proxy
    restart: unless-stopped
    volumes:
      - ./backend/sandbox/proxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./backend/sandbox/proxy/filter:/etc/tinyproxy/filter:ro
    networks:
      - sandbox_net
      - sandbox_egress

volumes:
  redis_data:
  postgres_data:
  reports_data:
  nvd_data:
  wordlists_data:

networks:
  # Internal: containers on this network have NO direct internet/LAN route.
  # Sandboxed agent containers are attached here by the runner and can only
  # reach the outside through sandbox-proxy's allowlist.
  sandbox_net:
    name: scanr_sandbox
    internal: true
  # Egress leg for sandbox-proxy only. Never attach sandboxed containers here.
  sandbox_egress:
