# Opt-in override that enables the AI command-execution sandbox.
#
#   docker compose -f docker-compose.yml -f docker-compose.sandbox.yml up -d --build
#
# Adds a dedicated, socket-isolated sandbox-runner and an install-filtering
# proxy, and points the api/worker at the runner. The base docker-compose.yml is
# unaffected, so the sandbox is OFF unless you start with this override.
#
# Security notes (see docs/ai-sandbox-design.md):
# - Only the sandbox-runner gets the Docker socket; it holds NO ScanR secrets.
# - Spawned sandbox containers are ephemeral, non-root, read-only, cap-drop ALL,
#   resource/time-limited, and have no ScanR env.
# - The proxy allowlists package mirrors for installs. STRICT per-target L3
#   egress (so raw scans can only reach the scan's targets) requires a host
#   firewall on the `scanr_sandbox` network and MUST be validated on your host.

services:
  api:
    environment:
      SANDBOX_RUNNER_URL: ${SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set to enable the sandbox}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-scanr-sandbox:latest}
      SANDBOX_CMD_TIMEOUT: ${SANDBOX_CMD_TIMEOUT:-120}

  worker:
    environment:
      SANDBOX_RUNNER_URL: ${SANDBOX_RUNNER_URL:-http://sandbox-runner:8090}
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set to enable the sandbox}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-scanr-sandbox:latest}
      SANDBOX_CMD_TIMEOUT: ${SANDBOX_CMD_TIMEOUT:-120}

  sandbox-runner:
    build:
      context: ./backend
      dockerfile: sandbox/Dockerfile.runner
    image: scanr-sandbox-runner:latest
    restart: unless-stopped
    # The ONLY service with Docker socket access. NO ScanR secrets here.
    environment:
      SANDBOX_TOKEN: ${SANDBOX_TOKEN:?SANDBOX_TOKEN must be set to enable the sandbox}
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-scanr-sandbox:latest}
      SANDBOX_NETWORK: scanr_sandbox
      SANDBOX_PROXY_URL: ${SANDBOX_PROXY_URL:-http://sandbox-proxy:8888}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - default
      - sandbox_net

  sandbox-proxy:
    image: vimagick/tinyproxy:latest
    restart: unless-stopped
    # Filtering forward-proxy: installs reach allowlisted mirrors only.
    volumes:
      - ./backend/sandbox/proxy/tinyproxy.conf:/etc/tinyproxy/tinyproxy.conf:ro
      - ./backend/sandbox/proxy/filter:/etc/tinyproxy/filter:ro
    networks:
      - sandbox_net

networks:
  sandbox_net:
    name: scanr_sandbox
