services:
  api:
    environment:
      SELF_UPDATE_ENABLED: ${SELF_UPDATE_ENABLED:-true}
      SELF_UPDATE_COMMAND: ${SELF_UPDATE_COMMAND:-docker-compose -f docker-compose.yml -f docker-compose.self-update.yml pull && docker-compose -f docker-compose.yml -f docker-compose.self-update.yml up -d}
      SELF_UPDATE_WORKDIR: /opt/scanr
    volumes:
      - ${SCANR_PROJECT_DIR:-.}:/opt/scanr
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
