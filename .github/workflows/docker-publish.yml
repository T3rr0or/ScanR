name: Publish Docker Images

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # Run the exact CI jobs (tests, lint, type-check, audits) before publishing.
  # Defined once in ci.yml — do not inline copies here.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  publish:
    name: Build and publish
    needs:
      - ci
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: scanr-api
            context: ./backend
            file: Dockerfile
          - name: scanr-worker
            context: ./backend
            file: Dockerfile
          - name: scanr-frontend
            context: ./frontend
            file: Dockerfile
          - name: scanr-sandbox-runner
            context: ./backend
            file: sandbox/Dockerfile.runner
          - name: scanr-sandbox
            context: ./backend/sandbox
            file: Dockerfile.sandbox
          - name: scanr-sandbox-proxy
            context: ./backend
            file: sandbox/Dockerfile.proxy

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.context }}/${{ matrix.image.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
