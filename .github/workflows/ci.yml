name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
  # docker-publish.yml reuses these jobs so the pre-publish gate can never
  # drift from CI.
  workflow_call:

permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -e ".[dev]"

      - name: Audit backend dependencies
        working-directory: ./backend
        run: |
          pip install pip-audit
          # PYSEC-2026-1325 (ecdsa, no fixed release): transitive dep of
          # python-jose, only exercised by ES* JWT algorithms. ScanR's
          # config.py allowlists HS256/384/512 only, so ecdsa is never used.
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2026-1325

      - name: Lint backend
        working-directory: ./backend
        run: ruff check scanr/

      - name: Type-check backend
        working-directory: ./backend
        run: mypy scanr/

      - name: Run backend tests
        working-directory: ./backend
        run: pytest -q

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: ./frontend
        run: npm audit --audit-level=moderate

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
